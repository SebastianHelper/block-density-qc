<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dichte Rechner</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="card">
      <div class="header">
        <h1>Dichte Rechner</h1>
        <p class="muted">Sembla Qualitätskontrolle · I2 / I3</p>
      </div>

      <section class="field">
        <label>Steintyp wählen</label>
        <div class="type-grid" role="radiogroup" aria-label="Steintyp">
          <button type="button" class="type-btn active" data-type="I2" role="radio" aria-checked="true">
            <img src="assets/i2.jpg" alt="DOUBLE Stein (I2)" loading="lazy" />
            <span>DOUBLE · I2</span>
          </button>

          <button type="button" class="type-btn" data-type="I3" role="radio" aria-checked="false">
            <img src="assets/i3.jpg" alt="TRIPPLE Stein (I3)" loading="lazy" />
            <span>TRIPPLE · I3</span>
          </button>
        </div>
      </section>

      <div class="field">
        <label>Gewicht (kg)</label>
        <div class="stepper">
          <button type="button" class="step-btn" data-field="weight" data-dir="-1">−</button>
          <span id="weight-val" class="step-val">13.0</span>
          <button type="button" class="step-btn" data-field="weight" data-dir="1">+</button>
        </div>
      </div>

      <div class="field">
        <label>Höhe (cm)</label>
        <div class="stepper">
          <button type="button" class="step-btn" data-field="height" data-dir="-1">−</button>
          <span id="height-val" class="step-val">21.5</span>
          <button type="button" class="step-btn" data-field="height" data-dir="1">+</button>
        </div>
      </div>

      <section id="result" class="result" aria-live="polite"></section>
    </main>

    <script src="app.js?v=20260402d"></script>
  </body>
</html>
