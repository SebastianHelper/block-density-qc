<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Block Density QC</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="card">
      <h1>Block Density QC</h1>
      <p class="muted">One-page calculator for I2 / I3 quality control.</p>

      <form id="qc-form">
        <label for="blockType">Block type</label>
        <select id="blockType" required>
          <option value="I2">I2</option>
          <option value="I3">I3</option>
        </select>

        <label for="weight">Weight (kg)</label>
        <input id="weight" type="number" min="0" step="0.001" required />

        <label for="height">Height (cm)</label>
        <input id="height" type="number" min="0" step="0.01" required />

        <button type="submit">Compute</button>
      </form>

      <section id="result" class="result" aria-live="polite"></section>

      <details>
        <summary>Formula settings</summary>
        <p class="muted">
          Update factors/limits in <code>app.js</code> once you confirm values from your QC sheet.
        </p>
      </details>
    </main>

    <script src="app.js"></script>
  </body>
</html>
