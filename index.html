<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dichte Rechner</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="card">
      <div class="header">
        <h1>Dichte Rechner</h1>
        <p class="muted">I2 / I3 Qualitätskontrolle</p>
      </div>

      <div class="field">
        <label for="blockType">Steintyp</label>
        <select id="blockType">
          <option value="I2">I2</option>
          <option value="I3">I3</option>
        </select>
      </div>

      <div class="field">
        <label>Gewicht (kg)</label>
        <div class="stepper">
          <button type="button" class="step-btn" data-field="weight" data-dir="-1">−</button>
          <span id="weight-val" class="step-val">13.0</span>
          <button type="button" class="step-btn" data-field="weight" data-dir="1">+</button>
        </div>
      </div>

      <div class="field">
        <label>Höhe (cm)</label>
        <div class="stepper">
          <button type="button" class="step-btn" data-field="height" data-dir="-1">−</button>
          <span id="height-val" class="step-val">21.5</span>
          <button type="button" class="step-btn" data-field="height" data-dir="1">+</button>
        </div>
      </div>

      <section id="result" class="result" aria-live="polite"></section>
    </main>

    <script src="app.js?v=20260402c"></script>
  </body>
</html>
